{% load static %}
<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Delete Maintenance Record — Farm Management System</title>
  <link rel="stylesheet" href="https://unpkg.com/boxicons@2.1.4/css/boxicons.min.css">
  <link rel="stylesheet" href="{% static 'css/main.css' %}">
</head>
<body>
  <div class="auth-page">
    <div class="delete-container">
      <div class="delete-icon">
        <i class='bx bx-trash'></i>
      </div>
      <h1>Delete Maintenance Record</h1>
      <p>Are you sure you want to delete this maintenance record? This action cannot be undone.</p>
      <form method="post">
        {% csrf_token %}
        <div class="delete-actions">
          <a href="{% url 'homepage:show-machinery' %}" class="btn btn-outline">Cancel</a>
          <button type="submit" class="btn btn-danger">Delete</button>
        </div>
      </form>
    </div>
  </div>
</body>
</html>
