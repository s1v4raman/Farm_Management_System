{% load static %}
<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Forgot Password — Farm Management</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
    <style>
        body { font-family: 'Inter', sans-serif; }
    </style>
</head>
<body class="text-[#2d3035] bg-cover bg-center bg-no-repeat bg-fixed" style="background-image: url('{% static 'images/sunrise.jpg' %}');">

    <div class="min-h-screen flex items-center justify-center p-4 bg-black/20 backdrop-blur-[2px]">
        <div class="bg-white/95 backdrop-blur-xl p-8 sm:p-10 rounded-2xl border border-white/50 shadow-[0_8px_40px_rgba(0,0,0,0.15)] max-w-md w-full relative">
            
            <div class="text-center mb-8">
                <div class="inline-flex items-center justify-center w-16 h-16 rounded-full bg-[rgba(0,204,0,0.1)] text-[#00cc00] mb-4 border border-[rgba(0,204,0,0.2)] shadow-[0_4px_15px_rgba(0,204,0,0.2)]">
                    <svg class="w-8 h-8" fill="none" stroke="currentColor" viewBox="0 0 24 24" xmlns="http://www.w3.org/2000/svg"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M15 7a2 2 0 012 2m4 0a6 6 0 01-7.743 5.743L11 17H9v2H7v2H4v-3.268l5.257-5.257A6 6 0 1115 7h.01"></path></svg>
                </div>
                <h1 class="text-2xl font-bold text-[#32353c] tracking-wide">Reset Password</h1>
                <p class="text-[#757575] mt-2 text-sm">Enter your registered email address.</p>
            </div>

            <form method="POST" action="{% url 'authentication:forgot_password' %}" class="space-y-6">
                {% csrf_token %}
                <div>
                    <label for="email" class="block text-sm font-bold text-[#32353c] mb-1.5 ml-1 uppercase tracking-wider text-[11px]">Email Address</label>
                    <input type="email" id="email" name="email" required 
                           class="w-full px-4 py-3 rounded-xl border border-[#ededed] bg-[#f4f5f7] text-[#32353c] focus:ring-2 focus:ring-[#00cc00] focus:border-[#00cc00] transition-all outline-none placeholder-[#a0aab5]">
                </div>
                
                <button type="submit" 
                        class="w-full bg-[#00cc00] hover:bg-[#00aa00] text-white font-bold tracking-wide py-3.5 rounded-xl transition-all shadow-[0_4px_14px_rgba(0,204,0,0.35)] hover:-translate-y-[1px]">
                    Send Reset Link
                </button>
            </form>

            <div class="mt-8 text-center border-t border-[#ededed] pt-6">
                <a href="{% url 'authentication:login' %}" class="text-[#00cc00] font-semibold hover:text-[#33dd33] transition-colors inline-block"><i class='bx bx-left-arrow-alt align-middle text-lg'></i> Back to Login</a>
            </div>
        </div>
    </div>

    <link rel="stylesheet" href="https://unpkg.com/boxicons@2.1.4/css/boxicons.min.css">
</body>
</html>
