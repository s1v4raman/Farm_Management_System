{% load static %}
<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Login — Farm Management</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
    <style>
        body { font-family: 'Inter', sans-serif; }
    </style>
</head>
<body class="text-[#2d3035] bg-cover bg-center bg-no-repeat bg-fixed" style="background-image: url('{% static 'images/sunrise.jpg' %}');">

    <div class="min-h-screen flex items-center justify-center p-4 bg-black/20 backdrop-blur-[2px]">
        <div class="bg-white/95 backdrop-blur-xl p-8 sm:p-10 rounded-2xl border border-white/50 shadow-[0_8px_40px_rgba(0,0,0,0.15)] max-w-md w-full relative">
            
            <div class="text-center mb-8">
                <div class="inline-flex items-center justify-center w-16 h-16 rounded-full bg-[rgba(0,204,0,0.1)] text-[#00cc00] mb-4 border border-[rgba(0,204,0,0.2)] shadow-[0_4px_15px_rgba(0,204,0,0.2)]">
                    <svg class="w-8 h-8" fill="none" stroke="currentColor" viewBox="0 0 24 24" xmlns="http://www.w3.org/2000/svg"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M3 12l2-2m0 0l7-7 7 7M5 10v10a1 1 0 001 1h3m10-11l2 2m-2-2v10a1 1 0 01-1 1h-3m-6 0a1 1 0 001-1v-4a1 1 0 011-1h2a1 1 0 011 1v4a1 1 0 001 1m-6 0h6"></path></svg>
                </div>
                <h1 class="text-3xl font-bold text-[#32353c] tracking-wide">FarmHub Login</h1>
                <p class="text-[#757575] mt-2">Manage your farm retail business</p>
            </div>

            <!-- Role Toggle -->
            <div class="flex bg-[#f4f5f7] border border-[#ededed] p-1 rounded-full mb-8 relative">
                <div class="absolute left-1 top-1 bottom-1 w-[calc(50%-4px)] bg-[#00cc00] rounded-full shadow-md transition-transform duration-300 ease-in-out" id="togglePill"></div>
                <button onclick="setRole('user')" id="btnUser" class="flex-1 py-2 text-sm font-semibold tracking-wide z-10 text-white transition-colors duration-300 focus:outline-none">Customer</button>
                <button onclick="setRole('employee')" id="btnEmployee" class="flex-1 py-2 text-sm font-semibold tracking-wide z-10 text-[#757575] transition-colors duration-300 focus:outline-none">Farmer</button>
            </div>

            {% if error_message %}
                <div class="bg-[rgba(239,68,68,0.1)] border border-[#ef4444] text-[#ef4444] p-3 rounded-xl mb-6 text-sm flex items-center shadow-sm">
                    <svg class="w-5 h-5 mr-3 flex-shrink-0" fill="currentColor" viewBox="0 0 20 20"><path fill-rule="evenodd" d="M18 10a8 8 0 11-16 0 8 8 0 0116 0zm-7 4a1 1 0 11-2 0 1 1 0 012 0zm-1-9a1 1 0 00-1 1v4a1 1 0 102 0V6a1 1 0 00-1-1z" clip-rule="evenodd"></path></svg>
                    <span>{{ error_message }}</span>
                </div>
            {% endif %}

            <form method="POST" action="{% url 'authentication:login' %}" class="space-y-6">
                {% csrf_token %}
                <input type="hidden" name="role" id="roleInput" value="user">
                <div>
                    <label for="fname" class="block text-sm font-bold text-[#32353c] mb-1.5 ml-1 uppercase tracking-wider text-[11px]">Username</label>
                    <input type="text" id="fname" name="fname" required 
                           class="w-full px-4 py-3 rounded-xl border border-[#ededed] bg-[#f4f5f7] text-[#32353c] focus:ring-2 focus:ring-[#00cc00] focus:border-[#00cc00] transition-all outline-none placeholder-[#a0aab5]">
                </div>
                
                <div>
                    <div class="flex items-center justify-between mb-1.5 ml-1">
                        <label for="pwd" class="block text-sm font-bold text-[#32353c] uppercase tracking-wider text-[11px]">Password</label>
                        <a href="{% url 'authentication:forgot_password' %}" class="text-[12px] font-medium text-[#00cc00] hover:text-[#33dd33] transition-colors">Forgot password?</a>
                    </div>
                    <input type="password" id="pwd" name="pwd" required 
                           class="w-full px-4 py-3 rounded-xl border border-[#ededed] bg-[#f4f5f7] text-[#32353c] focus:ring-2 focus:ring-[#00cc00] focus:border-[#00cc00] transition-all outline-none placeholder-[#a0aab5]">
                </div>
                
                <button type="submit" 
                        class="w-full bg-[#00cc00] hover:bg-[#00aa00] text-white font-bold tracking-wide py-3.5 rounded-xl transition-all shadow-[0_4px_14px_rgba(0,204,0,0.35)] hover:-translate-y-[1px]">
                    Sign In <i class='bx bx-right-arrow-alt align-middle text-lg ml-1'></i>
                </button>
            </form>

            <div class="mt-8 text-center border-t border-[#ededed] pt-6" id="createAccountContainer">
                <p class="text-sm text-[#757575]">
                    Don't have an account? 
                    <br class="sm:hidden">
                    <a href="{% url 'authentication:register' %}" class="text-[#00cc00] font-semibold hover:text-[#33dd33] transition-colors inline-block mt-2 sm:mt-0 sm:ml-1">Create an account</a>
                </p>
            </div>
        </div>
    </div>

    <link rel="stylesheet" href="https://unpkg.com/boxicons@2.1.4/css/boxicons.min.css">

    <script>
        function setRole(role) {
            const btnUser = document.getElementById('btnUser');
            const btnEmployee = document.getElementById('btnEmployee');
            const togglePill = document.getElementById('togglePill');
            
            document.getElementById('roleInput').value = role;
            
            if (role === 'user') {
                togglePill.style.transform = 'translateX(0)';
                btnUser.classList.replace('text-[#757575]', 'text-white');
                btnUser.classList.add('text-white');
                btnEmployee.classList.replace('text-white', 'text-[#757575]');
                btnEmployee.classList.add('text-[#757575]');
            } else {
                togglePill.style.transform = 'translateX(100%)';
                btnEmployee.classList.replace('text-[#757575]', 'text-white');
                btnEmployee.classList.add('text-white');
                btnUser.classList.replace('text-white', 'text-[#757575]');
                btnUser.classList.add('text-[#757575]');
            }
        }

        document.addEventListener("DOMContentLoaded", () => {
            const initialRole = "{{ request.POST.role|default:'user' }}";
            setRole(initialRole);
        });
    </script>
</body>
</html>
