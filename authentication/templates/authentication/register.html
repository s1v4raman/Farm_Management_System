{% load static %}
<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Register — Farm Management System</title>
  <link rel="stylesheet" href="https://unpkg.com/boxicons@2.1.4/css/boxicons.min.css">
  <link rel="stylesheet" href="{% static 'css/main.css' %}">
</head>
<body>
  <div class="auth-page">
    <div class="auth-card">
      <div class="auth-header">
        <div class="logo-circle">
          <i class='bx bxs-leaf'></i>
        </div>
        <h1>Create Account</h1>
        <p>Start managing your farm today</p>
      </div>

      {% if error_message %}
      <div class="error-message">
        <i class='bx bx-error-circle'></i> {{ error_message }}
      </div>
      {% endif %}

      <form action="" method="POST">
        {% csrf_token %}
        <div class="input-group">
          <label for="username">Username</label>
          <input type="text" id="username" placeholder="Choose a username" name="username" required>
        </div>
        <div class="input-group">
          <label for="full_name">Full Name</label>
          <input type="text" id="full_name" placeholder="Enter your full name" name="full_name" required>
        </div>
        <div class="input-group">
          <label for="email">Email</label>
          <input type="email" id="email" placeholder="Enter your email" name="email" required>
        </div>
        <div class="input-group">
          <label for="password1">Password</label>
          <input type="password" id="password1" placeholder="Create a strong password" name="password1" required>
        </div>
        <div class="input-group">
          <label for="password2">Confirm Password</label>
          <input type="password" id="password2" placeholder="Repeat your password" name="password2" required>
        </div>
        <button type="submit" class="auth-submit">Create Account</button>
      </form>

      <div class="auth-footer">
        Already have an account? <a href="{% url 'authentication:login' %}">Sign in</a>
      </div>
    </div>
  </div>
</body>
</html>
