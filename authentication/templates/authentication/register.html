{% load static %}
<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="utf-8">
    <title>Register — ADMT Farm Management</title>
    <meta name="viewport" content="width=device-width, initial-scale=1, shrink-to-fit=no">
    <link href="https://fonts.googleapis.com/css2?family=Segoe+UI:wght@400;600&display=swap" rel="stylesheet">
    <style>
        * {
            box-sizing: border-box;
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
        }
        body {
            margin: 0;
            padding: 0;
            background-image: url("{% static 'images/sunset_farm.jpg' %}");
            background-size: cover;
            background-position: center;
            height: 100vh;
            display: flex;
            flex-direction: column;
            overflow: hidden;
            background-color: #0f172a;
        }
        .navbar {
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding: 20px 50px;
            color: white;
            z-index: 10;
        }
        .navbar-brand {
            font-size: 24px;
            font-weight: 600;
            display: flex;
            align-items: center;
            gap: 10px;
            text-transform: uppercase;
        }
        .navbar-links {
            display: flex;
            gap: 30px;
        }
        .navbar-links a {
            color: white;
            text-decoration: none;
            font-size: 15px;
            font-weight: 500;
        }
        .main-container {
            display: flex;
            flex: 1;
            width: 100%;
        }
        .left-side {
            flex: 4;
            display: flex;
            align-items: center;
            justify-content: center;
            color: white;
            text-shadow: 0 2px 10px rgba(0,0,0,0.5);
        }
        .left-side h1 {
            font-size: 40px;
            font-weight: 600;
            margin-bottom: 100px;
        }
        .right-side {
            flex: 6;
            background-color: #1e293b;
            border-top-left-radius: 80px;
            border-bottom-left-radius: 80px;
            padding: 40px 80px;
            position: relative;
            display: flex;
            flex-direction: column;
            box-shadow: -10px 0 30px rgba(0,0,0,0.5);
        }
        .custom-toggle {
            display: flex;
            align-self: flex-end;
            background: #0f172a;
            border-radius: 30px;
            overflow: hidden;
            border: 2px solid #334155;
            margin-bottom: 40px;
        }
        .custom-toggle a {
            padding: 8px 30px;
            text-decoration: none;
            color: #94a3b8;
            font-weight: 600;
            font-size: 14px;
            transition: 0.3s;
        }
        .custom-toggle a.active {
            background: #10b981;
            color: white;
            border-radius: 30px;
        }
        .form-container {
            max-width: 600px;
            margin: 0 auto;
            width: 100%;
        }
        .form-title {
            text-align: center;
            color: #f1f5f9;
            font-size: 28px;
            font-weight: 600;
            margin-bottom: 40px;
        }
        .form-grid {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 20px;
            margin-bottom: 20px;
        }
        .form-control {
            width: 100%;
            padding: 12px 20px;
            border: 1px solid #334155;
            border-radius: 10px;
            background-color: #0f172a;
            outline: none;
            color: #f1f5f9;
            font-size: 14px;
        }
        .form-control::placeholder {
            color: #64748b;
        }
        .form-control:focus {
            border-color: #10b981;
            box-shadow: 0 0 0 2px rgba(16,185,129,0.2);
        }
        .gender-group {
            grid-column: span 2;
            display: flex;
            gap: 20px;
            align-items: center;
            color: #f1f5f9;
            font-size: 14px;
        }
        .bottom-actions {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-top: 30px;
        }
        .bottom-actions a {
            color: #3b82f6;
            text-decoration: none;
            font-size: 14px;
        }
        .bottom-actions a:hover {
            text-decoration: underline;
            color: #60a5fa;
        }
        .btn-register {
            background-color: #10b981;
            color: white;
            border: none;
            padding: 12px 40px;
            border-radius: 20px;
            font-weight: 600;
            cursor: pointer;
            font-size: 16px;
            transition: 0.3s;
            box-shadow: 0 4px 14px rgba(16,185,129,0.35);
        }
        .btn-register:hover {
            background-color: #059669;
            transform: translateY(-1px);
        }
    </style>
</head>
<body>
    <div class="navbar">
        <div class="navbar-brand">
            ADMT FARM MANAGEMENT
        </div>
        <div class="navbar-links">
            <a href="#">HOME</a>
            <a href="#">ABOUT US</a>
            <a href="#">CONTACT</a>
        </div>
    </div>

    <div class="main-container">
        <div class="left-side">
            <h1>Welcome</h1>
        </div>
        <div class="right-side">
            <div class="custom-toggle">
                <a href="#" class="active" id="btnUser" onclick="setRole('user')">Customer</a>
                <a href="#" id="btnEmployee" onclick="setRole('employee')">Farmer</a>
            </div>

            <div class="form-container">
                <h2 class="form-title" id="formTitle">Register as Customer</h2>
                
                {% if error_message %}
                <div style="text-align: center; color: red; margin-bottom: 20px;">
                    {{ error_message }}
                </div>
                {% endif %}

                <form method="POST" action="{% url 'authentication:register' %}" onsubmit="return validateForm()">
                    {% csrf_token %}
                    <input type="hidden" name="account_type" id="account_type" value="user">

                    <div class="form-grid">
                        <input type="text" class="form-control" placeholder="First Name *" name="full_name" required>
                        <input type="text" class="form-control" placeholder="Last Name *" name="last_name"> <!-- Dummy field -->
                        <input type="email" class="form-control" placeholder="Your Email *" name="email" required>
                        <input type="text" class="form-control" placeholder="Your Phone *" name="phone"> <!-- Dummy field -->
                        <input type="text" class="form-control" placeholder="Username *" name="username" required>
                        <input type="password" class="form-control" placeholder="Password *" id="password" name="password1" required>
                        <input type="password" class="form-control" placeholder="Confirm Password *" id="cpassword" name="password2" required>
                    </div>

                    <div class="gender-group">
                        <label><input type="radio" name="gender" value="male" checked> Male</label>
                        <label><input type="radio" name="gender" value="female"> Female</label>
                    </div>

                    <div class="bottom-actions">
                        <a href="{% url 'authentication:login' %}">Already have an account?</a>
                        <button type="submit" class="btn-register">Register</button>
                    </div>
                </form>
            </div>
        </div>
    </div>

    <script>
        function setRole(role) {
            document.getElementById('account_type').value = role;
            
            document.getElementById('btnUser').classList.remove('active');
            document.getElementById('btnEmployee').classList.remove('active');
            
            if (role === 'user') {
                document.getElementById('btnUser').classList.add('active');
                document.getElementById('formTitle').innerText = 'Register as Customer';
            } else if (role === 'employee') {
                document.getElementById('btnEmployee').classList.add('active');
                document.getElementById('formTitle').innerText = 'Register as Farmer';
            }
        }

        function validateForm() {
            var pass = document.getElementById("password").value;
            var cpass = document.getElementById("cpassword").value;
            if (pass !== cpass) {
                alert("Passwords do not match!");
                return false;
            }
            if (pass.length < 6) {
                alert("Password must be at least 6 characters long.");
                return false;
            }
            return true;
        }
    </script>
</body>
</html>
